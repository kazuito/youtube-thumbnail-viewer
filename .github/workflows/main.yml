name: Main

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build apps
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

      - name: Install Playwright Chromium
        run: pnpm --filter chrome exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: xvfb-run -a pnpm --filter chrome test:e2e
